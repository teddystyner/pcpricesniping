name: price-monitor

on:
  schedule:
    # UTC 기준. 00:00 / 12:00 UTC = 09:00 / 21:00 KST (일 2회)
    - cron: "0 0,12 * * *"
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write          # price_history.json 커밋용

concurrency:
  group: price-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price_history.json chart.html
          if git diff --staged --quiet; then
            echo "변경 없음, 커밋 생략"
            exit 0
          fi
          git commit -m "chore: update price history & chart [skip ci]"

          # 동시 push 충돌 시(다른 실행/로컬 push와 경합), 원격을 받아 rebase 후 재시도
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "push 거부됨, 원격 최신화 후 재시도 ($i/5)..."
            git fetch origin main
            if ! git rebase origin/main; then
              echo "rebase 충돌 발생, 자동 해결 불가. 다음 실행에서 재계산됩니다."
              git rebase --abort
              exit 1
            fi
          done
          echo "재시도 5회 후에도 push 실패"
          exit 1
